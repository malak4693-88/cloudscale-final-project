apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudscale-final-app
  labels:
    app: cloudscale-final-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloudscale-final-app
  template:
    metadata:
      labels:
        app: cloudscale-final-app
    spec:
      containers:
        - name: cloudscale-final-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
